---
- name: Create a Telemt service unit
  become: true
  ansible.builtin.template:
    src: telemt.service.j2
    dest: /etc/systemd/system/telemt.service
    mode: '0644'
  notify: "restart telemt service"

- name: Make sure the Telemt systemd service are started and enabled
  ansible.builtin.systemd_service:
    name: telemt.service
    state: started
    enabled: true
    daemon_reload: true
